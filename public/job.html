<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Detail – BuéaJobs</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Buéa<span>Jobs</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="listings.html" class="active">Find Jobs</a></li>
        <li><a href="post-job.html" class="nav-cta">Post a Job</a></li>
      </ul>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div id="pageContent">
    <div class="section"><div class="container"><div class="loading"><div class="spinner"></div><p>Loading job...</p></div></div></div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none; padding-top:0;">
        <p>© 2025 BuéaJobs. Built for Buea's Youth.</p>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const jobId = params.get('id');

    if (!jobId) {
      location.href = 'listings.html';
    } else {
      fetch(`/api/jobs/${jobId}`)
        .then(r => r.json())
        .then(data => {
          if (!data.success) { location.href = 'listings.html'; return; }
          const job = data.job;
          document.title = `${job.title} – BuéaJobs`;

          document.getElementById('pageContent').innerHTML = `
            <div class="page-hero">
              <div class="container">
                <div class="breadcrumb">
                  <a href="listings.html">← Find Jobs</a>
                  <span>/ ${job.title}</span>
                </div>
                <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;">
                  <div>
                    <h1 style="font-family:'Syne',sans-serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;margin-bottom:8px;">${job.title}</h1>
                    <p style="color:var(--gray);font-size:1rem;">${job.company} · ${job.location}</p>
                  </div>
                  <span class="job-badge ${getBadgeClass(job.type)}" style="font-size:0.9rem;padding:6px 14px;">${job.type}</span>
                </div>
              </div>
            </div>

            <section class="section" style="padding-top:40px;">
              <div class="container">
                <div class="job-detail-layout">
                  <div class="job-detail-main">
                    <div class="detail-card">
                      <h2>Job Description</h2>
                      <p>${job.description}</p>
                    </div>
                    <div class="detail-card">
                      <h2>Requirements</h2>
                      <ul class="requirements-list">
                        ${job.requirements.map(r => `<li>${r}</li>`).join('')}
                      </ul>
                    </div>
                    <div class="detail-card">
                      <h2>About the Company</h2>
                      <p>${job.companyAbout}</p>
                      <p style="margin-top:12px;">📧 <a href="mailto:${job.contactEmail}" style="color:var(--amber);">${job.contactEmail}</a></p>
                    </div>
                  </div>

                  <div class="job-detail-sidebar">
                    <div class="apply-card">
                      <h3>Interested?</h3>
                      <p>Apply now and take the next step in your career.</p>
                      <button class="btn btn-amber btn-block" onclick="showApplyModal('${job.id}', '${job.title}', '${job.company}')">
                        Apply Now →
                      </button>
                    </div>
                    <div class="detail-card">
                      <h2>Job Overview</h2>
                      <div class="overview-grid">
                        <div class="overview-row"><span class="overview-label">Job Type</span><span class="overview-value">${job.type}</span></div>
                        <div class="overview-row"><span class="overview-label">Location</span><span class="overview-value">${job.location}</span></div>
                        <div class="overview-row"><span class="overview-label">Category</span><span class="overview-value">${job.category}</span></div>
                        <div class="overview-row"><span class="overview-label">Experience</span><span class="overview-value">${job.experience}</span></div>
                        <div class="overview-row"><span class="overview-label">Salary</span><span class="overview-value" style="color:var(--amber)">${job.salary}</span></div>
                        <div class="overview-row"><span class="overview-label">Deadline</span><span class="overview-value">${formatDate(job.deadline)}</span></div>
                        <div class="overview-row"><span class="overview-label">Posted</span><span class="overview-value">${formatDate(job.postedAt)}</span></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          `;
        })
        .catch(() => location.href = 'listings.html');
    }

    // ─── Apply Modal ───────────────────────────────────────────
    function showApplyModal(jobId, jobTitle, company) {
      const modal = document.createElement('div');
      modal.id = 'applyModal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;';
      modal.innerHTML = `
        <div style="background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <div>
              <h2 style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;">Apply for: ${jobTitle}</h2>
              <p style="color:var(--gray);font-size:0.85rem;margin-top:4px;">${company}</p>
            </div>
            <button onclick="document.getElementById('applyModal').remove()" style="background:none;border:none;color:var(--gray);font-size:1.5rem;cursor:pointer;line-height:1;">×</button>
          </div>
          <div class="form-group">
            <label>Full Name <span>*</span></label>
            <input type="text" id="appName" class="form-control" placeholder="e.g. John Mbah Nkeng">
          </div>
          <div class="form-group">
            <label>Email Address <span>*</span></label>
            <input type="email" id="appEmail" class="form-control" placeholder="e.g. john@gmail.com">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="appPhone" class="form-control" placeholder="e.g. +237 6XX XXX XXX">
          </div>
          <div class="form-group">
            <label>Cover Letter</label>
            <textarea id="appCover" class="form-control" rows="4" placeholder="Tell the employer why you're a good fit..."></textarea>
          </div>
          <div class="form-group">
            <label>Upload CV (PDF, max 5MB)</label>
            <input type="file" id="appCV" class="form-control" accept=".pdf,.doc,.docx">
          </div>
          <button class="btn btn-amber btn-block" id="submitAppBtn" onclick="submitApplication('${jobId}')">
            Submit Application →
          </button>
        </div>
      `;
      document.body.appendChild(modal);
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    function submitApplication(jobId) {
      const name = document.getElementById('appName').value.trim();
      const email = document.getElementById('appEmail').value.trim();
      const phone = document.getElementById('appPhone').value.trim();
      const cover = document.getElementById('appCover').value.trim();
      const cv = document.getElementById('appCV').files[0];
      const btn = document.getElementById('submitAppBtn');

      if (!name || !email) { showToast('Please fill in your name and email.', 'error'); return; }

      const formData = new FormData();
      formData.append('jobId', jobId);
      formData.append('fullName', name);
      formData.append('email', email);
      formData.append('phone', phone);
      formData.append('coverLetter', cover);
      if (cv) formData.append('cv', cv);

      btn.textContent = 'Submitting...';
      btn.disabled = true;

      fetch('/api/apply', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            document.getElementById('applyModal').remove();
            showToast('Application submitted successfully! Good luck! 🎉', 'success');
          } else {
            showToast(data.message || 'Something went wrong.', 'error');
            btn.textContent = 'Submit Application →';
            btn.disabled = false;
          }
        })
        .catch(() => {
          showToast('Network error. Please try again.', 'error');
          btn.textContent = 'Submit Application →';
          btn.disabled = false;
        });
    }
  </script>
</body>
</html>
